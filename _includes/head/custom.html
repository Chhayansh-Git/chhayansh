<!-- Annai Chat Widget: Styles -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/chat-widget.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>

<!-- Annai Chat Widget: Three.js + VRM (loaded as ES module, exposed to window) -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.171.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.3.4/lib/three-vrm.module.min.js"
  }
}
</script>
<script type="module">
  try {
    const THREE = await import('three');
    const { GLTFLoader } = await import('three/addons/loaders/GLTFLoader.js');
    const { VRMLoaderPlugin } = await import('@pixiv/three-vrm');
    // Expose to global scope for chat-widget.js
    window.THREE = THREE;
    window.THREE.GLTFLoader = GLTFLoader;
    window.THREE.VRMLoaderPlugin = VRMLoaderPlugin;
    console.log('Annai: Three.js + VRM loaded successfully.');
  } catch (err) {
    console.error('Annai: Failed to load Three.js/VRM:', err);
  }
</script>

<!-- end custom head snippets -->
